name: bash_unit tests
on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    - name: Lint shell scripts with ShellCheck
      run: |
        entry_files=$(git ls-files '*.sh' '*.bash' '*.bash_profile' 'bash_unit' ':!:spec/*')
        module_files=$(git ls-files 'modules/*.bashrc' 'modules/*.bash_aliases')
        spec_files=$(git ls-files 'spec/*.bash')

        # Lint entry scripts strictly.
        shellcheck --norc --exclude=SC1091 -S info -P SCRIPTDIR -P . -f gcc $entry_files

        # Module files are sourced libraries; SC2317 is noisy in this context.
        shellcheck --norc --exclude=SC1091,SC2317 -S info -P SCRIPTDIR -P . -f gcc $module_files

        # Spec files are bash_unit test libraries; SC2317 can be a false positive.
        shellcheck --norc --exclude=SC1091,SC2317 -S info -P SCRIPTDIR -P . -f gcc $spec_files
    - name: Unit testing with bash_unit
      run: |
        curl -s https://raw.githubusercontent.com/bash-unit/bash_unit/master/install.sh | bash
        shopt -s nullglob
        for spec_file in spec/test-*; do
          FORCE_COLOR=true timeout 15 ./bash_unit "$spec_file"
          status=$?

          if [ $status -eq 124 ]; then
            echo "::error::Timeout failure: $spec_file exceeded 15 seconds"
            exit 124
          fi

          if [ $status -ne 0 ]; then
            echo "::error::Test failure: $spec_file exited with status $status"
            exit $status
          fi
        done